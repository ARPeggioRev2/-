    <style>
        :root {
            --expo-red: #E60012;
            --expo-blue: #0068B7;

            --font-main: "Helvetica Now Text Medium", "Helvetica Now Text", "YuGothic", "Yu Gothic", "遊ゴシック体", "遊ゴシック", sans-serif;

        body, html {
            margin: 0; padding: 0; overflow: hidden;

        /* 修正：WHITEテキストとテンポボタンの非アクティブ時テキストの色をexpo-blueに変更 */

<script>
const CONFIG = {
    COLORS: { RED: '#E60012', BLUE: '#0068B7', GRAY: '#D2D7DA', WHITE: '#FFFFFF', DARK_GRAY: '#222426' },
    CO_MYAKU: { RADIUS: 100, EYE_WHITE_RATIO: 0.45, PUPIL_RATIO: 0.20 },
    BPM: 120,
    AUDIO: { BASE_TICK: 250, PRIMES: { BASE: 7, PIANO_1: 11, STRINGS_1: 13, STRINGS_2: 17, PIANO_2: 19 } }
};

let width, height, dpr;
let entities = [];
let isMasterPlaying = false;
let isPressing = false;
let mouseX = 0, mouseY = 0;
let bodyY = 0, bodyScaleY = 1.0, jumpVelocity = 0, jumpTimer = 0;

const audioState = {
    masterDb: -6,
    pianoVol: 1.0, stringsVol: 1.0, baseVol: 1.0,
    pianoMuted: false, stringsMuted: false, baseMuted: false,
    activityLevel: 1.0, tempoScale: 1.0 
};

function dbToGain(db) {
    if (db <= -60) return 0;
    return Math.pow(10, db / 20);
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bgContainer = document.getElementById('bg-container');
const bgImage = document.getElementById('bg-image');

function startApp() {
    const opening = document.getElementById('opening-screen');
    const app = document.getElementById('main-app');
    opening.style.opacity = '0';
    setTimeout(() => {
        opening.style.visibility = 'hidden';
        app.style.visibility = 'visible';
        app.style.opacity = '1';
        togglePlayback();
    }, 800);
}

function resetBackground(color) {
    bgImage.style.display = 'none';
    bgContainer.style.backgroundColor = color;
    document.getElementById('file-input').value = "";
}

class SoundEngine {
    constructor() {
        this.ctx = null;
        this.ready = false;
        this.steps = 0;
        this.reverb = null;
        this.masterGain = null;
        this.masterCompressor = null;
        this.tickTimeout = null;
        this.scales = {
            strings: [329.63, 369.99, 415.30, 440.00, 493.88, 554.37, 659.25], 
            base: [82.41, 123.47],
            piano1: [329.63, 415.30, 493.88, 659.25], 
            piano2: [164.81, 207.65, 246.94, 293.66, 329.63],
            contact: [329.63, 369.99, 415.30, 440.00, 493.88, 554.37, 622.25, 659.25]
        };
        this.analysers = { piano: null, strings: null, base: null };
    }

    async init() {
        if (!this.ctx) {
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC();
            this.masterGain = this.ctx.createGain();
            this.updateMasterVolume(audioState.masterDb);
            
            this.masterCompressor = this.ctx.createDynamicsCompressor();
            this.masterCompressor.threshold.setValueAtTime(-18, this.ctx.currentTime);
            this.masterCompressor.knee.setValueAtTime(10, this.ctx.currentTime);
            this.masterCompressor.ratio.setValueAtTime(3, this.ctx.currentTime);
            this.masterCompressor.attack.setValueAtTime(0.01, this.ctx.currentTime);
            this.masterCompressor.release.setValueAtTime(0.25, this.ctx.currentTime);

            this.reverb = this.ctx.createConvolver();
            await this.initReverb();
            ['piano', 'strings', 'base'].forEach(p => {
                const node = this.ctx.createAnalyser();
                node.fftSize = 256;
                this.analysers[p] = node;
                node.connect(this.masterGain);
            });
            this.masterGain.connect(this.masterCompressor);
            this.masterCompressor.connect(this.reverb);
            this.reverb.connect(this.ctx.destination);
        }
        if (this.ctx.state === 'suspended') await this.ctx.resume();
        this.ready = true;
    }

    async initReverb() {
        const len = this.ctx.sampleRate * 3.5;
        const buf = this.ctx.createBuffer(2, len, this.ctx.sampleRate);
        for (let c = 0; c < 2; c++) {
            const data = buf.getChannelData(c);
            for (let i = 0; i < len; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
            }
        }
        this.reverb.buffer = buf;
    }

    updateMasterVolume(db) {
        if (this.masterGain) {
            const gain = dbToGain(db);
            this.masterGain.gain.setTargetAtTime(gain, this.ctx.currentTime, 0.05);
        }
    }

    triggerPiano(freq, panX, gain, isHigh = false) {
        if (!this.ready || !this.ctx || audioState.pianoMuted) return;
        const now = this.ctx.currentTime;
        const panner = this.ctx.createStereoPanner();
        panner.pan.setValueAtTime(panX, now);
        const finalGain = gain * audioState.pianoVol * 1.2;
        const pg = this.ctx.createGain();
        pg.gain.setValueAtTime(0, now);
        pg.gain.linearRampToValueAtTime(finalGain, now + 0.005);
        pg.gain.exponentialRampToValueAtTime(0.001, now + (isHigh ? 1.8 : 3.0));
        const osc1 = this.ctx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(freq, now);
        osc1.connect(pg);
        const lp = this.ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.setValueAtTime(isHigh ? 3500 : 1800, now);
        osc1.start(now); osc1.stop(now + 3.1);
        pg.connect(lp); lp.connect(panner); panner.connect(this.analysers.piano);
    }

    triggerStrings(freq, panX, gain, type = 'high') {
        if (!this.ready || !this.ctx || audioState.stringsMuted) return;
        const now = this.ctx.currentTime;
        const groupGain = this.ctx.createGain();
        const panner = this.ctx.createStereoPanner();
        panner.pan.setValueAtTime(panX, now);
        const formants = type === 'high' ? 
            [{ f: 700, q: 3, g: 1.0 }, { f: 1100, q: 5, g: 0.6 }, { f: 2800, q: 2, g: 0.25 }] : 
            [{ f: 450, q: 4, g: 1.0 }, { f: 750, q: 5, g: 0.5 }, { f: 2200, q: 2, g: 0.15 }];
        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now);
        const finalGain = gain * audioState.stringsVol * 2.2;
        formants.forEach(fm => {
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(fm.f, now);
            filter.Q.setValueAtTime(fm.q, now);
            const fg = this.ctx.createGain();
            fg.gain.setValueAtTime(fm.g * finalGain, now);
            osc.connect(filter); filter.connect(fg); fg.connect(groupGain);
        });
        const env = this.ctx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(finalGain, now + 1.2); 
        env.gain.exponentialRampToValueAtTime(0.001, now + 3.0);
        const masterLp = this.ctx.createBiquadFilter();
        masterLp.type = 'lowpass';
        masterLp.frequency.setValueAtTime(2000, now);
        osc.start(now); osc.stop(now + 3.1);
        groupGain.connect(env); env.connect(masterLp); masterLp.connect(panner); panner.connect(this.analysers.strings);
    }

    triggerBaseSound(freq, pan = 0) {
        if (!this.ready || !this.ctx || audioState.baseMuted) return;
        const now = this.ctx.currentTime;
        const gainNode = this.ctx.createGain();
        const filterNode = this.ctx.createBiquadFilter();
        const pannerNode = this.ctx.createStereoPanner();
        filterNode.type = 'lowpass';
        filterNode.frequency.setValueAtTime(2000, now);
        [0, 2, -2].forEach((detuneHz, i) => {
            const osc = this.ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq * 2 + detuneHz, now);
            osc.connect(filterNode);
            osc.start(now + i * 0.03); osc.stop(now + 12);
        });
        const finalGain = 0.45 * audioState.baseVol;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(finalGain, now + 0.8);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 10);
        pannerNode.pan.setValueAtTime(pan, now);
        filterNode.connect(gainNode); gainNode.connect(pannerNode); pannerNode.connect(this.analysers.base);
        this.spawnParticle(CONFIG.COLORS.GRAY);
    }

    triggerContactSound(freqIndex = null) {
        if (!this.ready || !this.ctx) return;
        const now = this.ctx.currentTime;
        const baseFreq = freqIndex !== null ? this.scales.contact[freqIndex % this.scales.contact.length] : this.scales.contact[Math.floor(Math.random() * this.scales.contact.length)];
        
        for (let i = 0; i < 3; i++) {
            const delay = i * 0.08;
            const startTime = now + delay;
            
            const bodyOsc = this.ctx.createOscillator();
            const bodyGain = this.ctx.createGain();
            bodyOsc.type = 'sine';
            bodyOsc.frequency.setValueAtTime(baseFreq, startTime);
            
            bodyGain.gain.setValueAtTime(0.001, startTime);
            const peakGain = (0.3 / (i + 1)); 
            bodyGain.gain.linearRampToValueAtTime(peakGain, startTime + 0.01);
            bodyGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

            bodyOsc.connect(bodyGain);
            bodyGain.connect(this.masterGain);
            bodyOsc.start(startTime);
            bodyOsc.stop(startTime + 0.6);

            if (i === 0) {
                const clickOsc = this.ctx.createOscillator();
                const clickGain = this.ctx.createGain();
                clickOsc.type = 'square'; 
                clickOsc.frequency.setValueAtTime(baseFreq * 4, startTime); 
                
                clickGain.gain.setValueAtTime(0.001, startTime);
                clickGain.gain.linearRampToValueAtTime(0.4, startTime + 0.01);
                clickGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.02);

                clickOsc.connect(clickGain);
                clickGain.connect(this.masterGain);
                clickOsc.start(startTime);
                clickOsc.stop(startTime + 0.03);
            }
        }
    }

    triggerInst(part, panX) {
        if (!this.ready || !this.ctx) return;
        const freqArr = this.scales[part] || this.scales.strings;
        const freq = freqArr[Math.floor(Math.random() * freqArr.length)];
        if (part === 'strings1' || part === 'strings2') {
            if (audioState.stringsMuted) return;
            this.triggerStrings(freq, panX, 0.5, part === 'strings1' ? 'high' : 'low');
            if (Math.random() < audioState.activityLevel) this.spawnParticle(CONFIG.COLORS.BLUE);
        } else if (part === 'base') {
            this.triggerBaseSound(freq, panX);
        } else if (part === 'piano1' || part === 'piano2') {
            if (audioState.pianoMuted) return;
            this.triggerPiano(freq, panX, 0.45, part === 'piano1');
            if (Math.random() < audioState.activityLevel) this.spawnParticle(CONFIG.COLORS.RED);
        }
    }

    spawnParticle(colorHex) {
        const angle = Math.random() * Math.PI * 2;
        const startX = width/2; const startY = height/2 + bodyY;
        if (Math.random() < 0.25) entities.push(new MiniCoMyaku(startX, startY, colorHex, angle));
        else entities.push(new Bubble(startX, startY, colorHex, angle));
    }

    startLoop() {
        const tick = () => {
            if (!isMasterPlaying || !this.ready) return;
            if (this.steps % CONFIG.AUDIO.PRIMES.BASE === 0) this.triggerInst('base', 0);
            if (this.steps % CONFIG.AUDIO.PRIMES.PIANO_1 === 0) this.triggerInst('piano1', -0.4);
            if (this.steps % CONFIG.AUDIO.PRIMES.PIANO_2 === 0) this.triggerInst('piano2', 0.4);
            if (this.steps % CONFIG.AUDIO.PRIMES.STRINGS_1 === 0) this.triggerInst('strings1', -0.25);
            if (this.steps % CONFIG.AUDIO.PRIMES.STRINGS_2 === 0) this.triggerInst('strings2', 0.25);
            this.steps++;
            this.tickTimeout = setTimeout(tick, CONFIG.AUDIO.BASE_TICK * audioState.tempoScale);
        };
        tick();
    }
}

class Bubble {
    constructor(x, y, color, angle) {
        this.baseX = x; this.baseY = y; this.color = color; this.angle = angle;
        this.speed = 1.5 + Math.random() * 2.5; this.dist = 0; this.life = 1.0; 
        this.maxSize = 25 + Math.random() * 25; this.offsetPhase = Math.random() * Math.PI * 2;
        this.offsetFreq = 0.05 + Math.random() * 0.05; this.offsetAmp = 10 + Math.random() * 20;
    }
    update() { this.dist += this.speed; this.life -= 0.006; return this.life > 0; }
    draw(ctx) {
        const tx = Math.cos(this.angle) * this.dist; const ty = Math.sin(this.angle) * this.dist;
        const wave = Math.sin(this.dist * this.offsetFreq + this.offsetPhase) * this.offsetAmp * (1.0 - this.life);
        const currentSize = this.maxSize * (1.0 - this.life); 
        ctx.save(); ctx.globalAlpha = Math.min(1.0, this.life * 5.0);
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.baseX + tx - Math.sin(this.angle)*wave, this.baseY + ty + Math.cos(this.angle)*wave, currentSize, 0, Math.PI * 2); ctx.fill(); 
        ctx.restore();
    }
}

class MiniCoMyaku {
    constructor(startX, startY, color, angle) {
        this.baseX = startX; this.baseY = startY; this.color = color; this.angle = angle;
        this.speed = 1.0 + Math.random() * 1.5; this.dist = 0; this.life = 1.0; this.maxSize = 35 + Math.random() * 15; 
        const ewAngle = Math.random() * Math.PI * 2;
        this.ewXRatio = Math.cos(ewAngle) * 0.3; this.ewYRatio = Math.sin(ewAngle) * 0.3;
        this.lookX = Math.cos(Math.random() * Math.PI * 2) * 0.5; this.lookY = Math.sin(Math.random() * Math.PI * 2) * 0.5;
        this.offsetPhase = Math.random() * Math.PI * 2; this.offsetFreq = 0.04 + Math.random() * 0.04; this.offsetAmp = 15 + Math.random() * 15;
    }
    update() { this.dist += this.speed; this.life -= 0.005; return this.life > 0.01; }
    draw(ctx) {
        const tx = Math.cos(this.angle) * this.dist; const ty = Math.sin(this.angle) * this.dist;
        const wave = Math.sin(this.dist * this.offsetFreq + this.offsetPhase) * this.offsetAmp * (1.0 - this.life);
        const currentSize = this.maxSize * (1.0 - this.life); 
        const ewR = currentSize * CONFIG.CO_MYAKU.EYE_WHITE_RATIO;
        const pR = currentSize * CONFIG.CO_MYAKU.PUPIL_RATIO;
        const ewX = this.ewXRatio * currentSize; const ewY = this.ewYRatio * currentSize;
        ctx.save(); ctx.translate(this.baseX + tx - Math.sin(this.angle)*wave, this.baseY + ty + Math.cos(this.angle)*wave);
        ctx.globalAlpha = Math.min(1.0, this.life * 5.0);
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, currentSize, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ewX, ewY, ewR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = CONFIG.COLORS.BLUE; ctx.beginPath(); ctx.arc(ewX + this.lookX*(ewR*0.5), ewY + this.lookY*(ewR*0.5), pR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

class Ripple {
    constructor(x, y) { this.x = x; this.y = y; this.life = 1.0; this.r = 10; }
    update() { this.life -= 0.02; this.r += 4; return this.life > 0; }
    draw(ctx) { ctx.save(); ctx.globalAlpha = this.life; ctx.strokeStyle = CONFIG.COLORS.BLUE; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }
}

class SmallParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const angle = Math.random() * Math.PI * 2; const speed = 2 + Math.random() * 4;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
        this.life = 1.0; this.size = 3 + Math.random() * 5;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.96; this.vy *= 0.96; this.life -= 0.03; return this.life > 0; }
    draw(ctx) { ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
}

class MainCoMyaku {
    constructor() {
        this.bodyR = CONFIG.CO_MYAKU.RADIUS;
        this.whiteEyeR = this.bodyR * CONFIG.CO_MYAKU.EYE_WHITE_RATIO;
        this.pupilR = this.bodyR * CONFIG.CO_MYAKU.PUPIL_RATIO;
        
        this.eyeLimitRatio = (this.bodyR - this.whiteEyeR) / this.bodyR;
        this.pupilLimitRatio = (this.whiteEyeR - this.pupilR) / this.whiteEyeR;

        const eyeLimit = this.bodyR * this.eyeLimitRatio;
        const pupilLimit = this.whiteEyeR * this.pupilLimitRatio;

        const startAngleE = Math.random() * Math.PI * 2;
        const startDistE = (0.7 + Math.random() * 0.3) * eyeLimit;
        this.eyeX = Math.cos(startAngleE) * startDistE;
        this.eyeY = Math.sin(startAngleE) * startDistE;
        this.targetEyeX = this.eyeX;
        this.targetEyeY = this.eyeY;

        const startAngleP = Math.random() * Math.PI * 2;
        const startDistP = (0.8 + Math.random() * 0.2) * pupilLimit;
        const relPX = Math.cos(startAngleP) * startDistP;
        const relPY = Math.sin(startAngleP) * startDistP;
        this.pupilX = this.eyeX + relPX;
        this.pupilY = this.eyeY + relPY;
        this.targetPupilX = relPX;
        this.targetPupilY = relPY;

        this.lastTime = performance.now();
        this.beatInterval = 60000 / CONFIG.BPM;
        this.beatCount = 0;
        this.accumulator = 0;
    }

    onTick() {
        const eyeLimit = this.bodyR * this.eyeLimitRatio;
        const pupilLimit = this.whiteEyeR * this.pupilLimitRatio;

        if (this.beatCount % 8 === 0 && !isPressing) {
            const eAngle = Math.random() * Math.PI * 2;
            const eDist = (0.7 + Math.random() * 0.3) * eyeLimit;
            this.targetEyeX = Math.cos(eAngle) * eDist;
            this.targetEyeY = Math.sin(eAngle) * eDist;

            const pAngle = Math.random() * Math.PI * 2;
            const pDist = (0.8 + Math.random() * 0.2) * pupilLimit;
            this.targetPupilX = Math.cos(pAngle) * pDist;
            this.targetPupilY = Math.sin(pAngle) * pDist;
        }
    }

    update() {
        const now = performance.now();
        const deltaTime = now - this.lastTime;
        this.lastTime = now;

        const eyeLimit = this.bodyR * this.eyeLimitRatio;
        const pupilLimit = this.whiteEyeR * this.pupilLimitRatio;

        this.accumulator += deltaTime;
        const effectiveBeatInterval = this.beatInterval * audioState.tempoScale;
        if (this.accumulator >= effectiveBeatInterval) {
            this.beatCount++;
            this.accumulator -= effectiveBeatInterval;
            this.onTick();
        }

        if (isPressing) {
            const dx = mouseX - width / 2;
            const dy = mouseY - (height / 2 + bodyY);
            const dist = Math.hypot(dx, dy);
            const angle = Math.atan2(dy, dx);
            
            const targetEyeDist = Math.min(dist, eyeLimit);
            this.targetEyeX = Math.cos(angle) * targetEyeDist;
            this.targetEyeY = Math.sin(angle) * targetEyeDist;

            const pdx = mouseX - (width / 2 + this.eyeX);
            const pdy = mouseY - (height / 2 + bodyY + this.eyeY);
            const pDist = Math.hypot(pdx, pdy);
            const pAngle = Math.atan2(pdy, pdx);
            
            const targetPupilDist = Math.min(pDist, pupilLimit);
            this.targetPupilX = Math.cos(pAngle) * targetPupilDist;
            this.targetPupilY = Math.sin(pAngle) * targetPupilDist;
        }

        const eyeSpeed = (deltaTime / effectiveBeatInterval) * 0.4; 
        const pupilSpeed = (deltaTime / effectiveBeatInterval) * 0.8;

        this.eyeX += (this.targetEyeX - this.eyeX) * Math.min(eyeSpeed, 1.0);
        this.eyeY += (this.targetEyeY - this.eyeY) * Math.min(eyeSpeed, 1.0);

        const eyeDist = Math.hypot(this.eyeX, this.eyeY);
        if (eyeDist > eyeLimit) {
            this.eyeX *= (eyeLimit / eyeDist);
            this.eyeY *= (eyeLimit / eyeDist);
        }

        let currentPupilRelX = this.pupilX - this.eyeX;
        let currentPupilRelY = this.pupilY - this.eyeY;
        
        const driftFactor = isPressing ? 0 : 0.4;
        const driftX = (this.eyeX / (eyeLimit || 1)) * pupilLimit * driftFactor;
        const driftY = (this.eyeY / (eyeLimit || 1)) * pupilLimit * driftFactor;

        currentPupilRelX += (this.targetPupilX + driftX - currentPupilRelX) * Math.min(pupilSpeed, 1.0);
        currentPupilRelY += (this.targetPupilY + driftY - currentPupilRelY) * Math.min(pupilSpeed, 1.0);

        const relDist = Math.hypot(currentPupilRelX, currentPupilRelY);
        if (relDist > pupilLimit) {
            currentPupilRelX *= (pupilLimit / relDist);
            currentPupilRelY *= (pupilLimit / relDist);
        }

        this.pupilX = this.eyeX + currentPupilRelX;
        this.pupilY = this.eyeY + currentPupilRelY;

        const normalizedY = (this.eyeY / (eyeLimit || 1)); 
        audioState.activityLevel = Math.max(0.1, 1.0 - ((normalizedY + 1) / 2) * 0.9);

        if (!isMasterPlaying) {
            if (bodyY === 0 && jumpVelocity === 0) { if (--jumpTimer <= 0) { jumpVelocity = -5.5; jumpTimer = 200; } }
            if (jumpVelocity !== 0 || bodyY < 0) { bodyY += jumpVelocity; jumpVelocity += 0.35; if (bodyY > 0) { bodyY = 0; jumpVelocity = 0; bodyScaleY = 0.92; } }
            bodyScaleY += (1.0 - bodyScaleY) * 0.15;
        } else { bodyY *= 0.85; bodyScaleY = 1.0; }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(width/2, height/2 + bodyY);
        ctx.scale(1.0, bodyScaleY);
        
        ctx.fillStyle = CONFIG.COLORS.RED;
        ctx.beginPath(); ctx.arc(0, 0, this.bodyR, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(this.eyeX, this.eyeY, this.whiteEyeR, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = CONFIG.COLORS.BLUE;
        ctx.beginPath(); ctx.arc(this.pupilX, this.pupilY, this.pupilR, 0, Math.PI * 2); ctx.fill();
        
        ctx.restore();
    }
}

const engine = new SoundEngine();
const uiModel = new MainCoMyaku();
const audioMenu = document.getElementById('audio-menu');
const audioTrigger = document.getElementById('audio-menu-trigger');
const playbackTrigger = document.getElementById('playback-trigger');

audioTrigger.onpointerdown = (e) => { e.stopPropagation(); audioMenu.classList.toggle('show'); };
audioMenu.onpointerdown = (e) => e.stopPropagation();
document.addEventListener('pointerdown', () => { if (audioMenu.classList.contains('show')) audioMenu.classList.remove('show'); });

async function togglePlayback(e) {
    if (e) e.stopPropagation();
    const btn = document.getElementById('playback-trigger');
    const icon = document.getElementById('playback-icon');

    if (isMasterPlaying) { 
        isMasterPlaying = false; 
        if (engine.tickTimeout) { clearTimeout(engine.tickTimeout); engine.tickTimeout = null; }
        btn.classList.remove('playing');
        icon.setAttribute('data-lucide', 'play');
    } else { 
        await engine.init(); 
        isMasterPlaying = true; 
        engine.startLoop(); 
        btn.classList.add('playing');
        icon.setAttribute('data-lucide', 'square');
    }
    lucide.createIcons();
}

playbackTrigger.addEventListener('click', togglePlayback);

document.getElementById('vol-master').oninput = (e) => {
    const db = parseInt(e.target.value); 
    audioState.masterDb = db;
    const displayVal = Math.round(((db + 60) / 60) * 100);
    document.getElementById('val-master').innerText = displayVal + '%'; 
    engine.updateMasterVolume(db);
};

const setTempo = (scale, e) => {
    if (e) e.stopPropagation();
    audioState.tempoScale = scale;
    document.getElementById('tempo-1').classList.toggle('active', scale === 1.0);
    document.getElementById('tempo-2').classList.toggle('active', scale === 2.0);
};
document.getElementById('tempo-1').onpointerdown = (e) => setTempo(1.0, e);
document.getElementById('tempo-2').onpointerdown = (e) => setTempo(2.0, e);

const toggleMute = (part, e) => {
    if (e) e.stopPropagation();
    audioState[part + 'Muted'] = !audioState[part + 'Muted'];
    document.getElementById('mute-' + part).classList.toggle('active', audioState[part + 'Muted']);
    document.getElementById('icon-' + part).setAttribute('data-lucide', audioState[part + 'Muted'] ? 'volume-x' : 'volume-2');
    lucide.createIcons();
};
document.getElementById('mute-piano').onpointerdown = (e) => toggleMute('piano', e);
document.getElementById('mute-strings').onpointerdown = (e) => toggleMute('strings', e);
document.getElementById('mute-base').onpointerdown = (e) => toggleMute('base', e);

document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => { bgImage.src = ev.target.result; bgImage.style.display = 'block'; };
        reader.readAsDataURL(file);
    }
};

const globalMove = document.getElementById('global-move');
globalMove.addEventListener('pointerdown', (e) => {
    isPressing = true;
    mouseX = e.clientX; mouseY = e.clientY;
    if (isMasterPlaying) {
        const freqIdx = Math.floor((e.clientX / width) * 8);
        engine.triggerContactSound(freqIdx);
        entities.push(new Ripple(e.clientX, e.clientY));
        const colors = [CONFIG.COLORS.RED, CONFIG.COLORS.BLUE, CONFIG.COLORS.WHITE];
        for (let i = 0; i < 10; i++) entities.push(new SmallParticle(e.clientX, e.clientY, colors[i % 3]));
    }
}, { passive: false });

window.addEventListener('pointermove', (e) => { 
    mouseX = e.clientX; mouseY = e.clientY;
}, { passive: false });

window.addEventListener('pointerup', () => { isPressing = false; }, { passive: false });

function resize() {
    dpr = window.devicePixelRatio || 1; 
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width * dpr; canvas.height = height * dpr;
    canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
    ctx.scale(dpr, dpr);
}

function loop() {
    ctx.clearRect(0, 0, width, height);
    entities = entities.filter(e => e.update() ? (e.draw(ctx), true) : false);
    uiModel.update(); uiModel.draw(ctx);
    requestAnimationFrame(loop);
}

window.onresize = resize;
resize(); loop(); lucide.createIcons();
</script>
